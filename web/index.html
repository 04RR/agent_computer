<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent_computer</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232734;
    --border: #2d3248;
    --text: #e2e4ea;
    --text-dim: #8b8fa3;
    --accent: #e84142;
    --accent-dim: #e8414220;
    --green: #34d399;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }
  header .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .nav-tabs {
    display: flex;
    gap: 4px;
  }
  .nav-tab {
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    border: none;
    background: transparent;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { color: var(--text); background: var(--accent-dim); }
  header .status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
  }
  .status-dot.disconnected { background: var(--accent); }

  /* ── App container ── */
  .app-container {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-header span {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sidebar-header button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--sans);
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .sidebar-header button:hover { opacity: 0.85; }
  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .session-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2px;
    transition: background 0.15s;
    position: relative;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item.active {
    background: var(--accent-dim);
    border-left: 3px solid var(--accent);
    padding-left: 9px;
  }
  .session-preview {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 20px;
  }
  .session-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
  }
  .session-delete {
    position: absolute;
    top: 10px;
    right: 10px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 14px;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    opacity: 0;
    transition: all 0.15s;
  }
  .session-item:hover .session-delete { opacity: 1; }
  .session-delete:hover { color: var(--accent); background: var(--accent-dim); }

  /* ── Chat view ── */
  #chat-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 3px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface2);
    border-bottom-left-radius: 3px;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  /* Tool events in chat */
  .tool-event {
    align-self: flex-start;
    font-size: 12px;
    font-family: var(--mono);
    padding: 8px 12px;
    border-radius: 6px;
    background: var(--surface);
    border-left: 3px solid var(--yellow);
    color: var(--text-dim);
    max-width: 85%;
    cursor: pointer;
  }
  .tool-event .label {
    color: var(--yellow);
    font-weight: 600;
  }
  .tool-event.result { border-left-color: var(--green); }
  .tool-event.result .label { color: var(--green); }
  .tool-event .duration { color: var(--green); font-size: 11px; margin-left: 8px; }
  .tool-event pre {
    margin-top: 4px;
    overflow-x: auto;
    max-height: 120px;
    overflow-y: auto;
    font-size: 11px;
    display: none;
  }
  .tool-event.expanded pre { display: block; }

  /* Thinking indicator */
  .thinking {
    align-self: flex-start;
    color: var(--text-dim);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .thinking .dots span {
    display: inline-block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: blink 1.4s infinite both;
  }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  /* ── Input area ── */
  #input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  #input-area textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 160px;
  }
  #input-area textarea:focus { border-color: var(--accent); }
  #input-area textarea::placeholder { color: var(--text-dim); }
  #input-area button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    font-family: var(--sans);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  #input-area button:hover { opacity: 0.85; }
  #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Dashboard view ── */
  #dashboard-view {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: none;
  }
  .dash-section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--text);
  }
  .time-range {
    display: flex;
    gap: 4px;
    margin-bottom: 18px;
  }
  .time-range button {
    padding: 5px 14px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .time-range button:hover { color: var(--text); border-color: var(--text-dim); }
  .time-range button.active {
    background: var(--accent-dim);
    color: var(--text);
    border-color: var(--accent);
  }
  .usage-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .usage-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .usage-card .card-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .usage-card .card-value {
    font-size: 28px;
    font-weight: 700;
    margin-top: 6px;
    color: var(--text);
  }
  .usage-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 32px;
  }
  .usage-table th {
    text-align: left;
    padding: 10px 12px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .usage-table th.right { text-align: right; }
  .usage-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .usage-table td.right { text-align: right; font-family: var(--mono); font-size: 12px; }
  .usage-table tr:hover { background: var(--surface); }
  .usage-table .session-name {
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Activity log ── */
  .activity-log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .activity-empty {
    color: var(--text-dim);
    font-size: 13px;
    padding: 32px;
    text-align: center;
  }
  .activity-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-item:hover { background: var(--surface2); }
  .activity-item .act-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .activity-item .act-session {
    font-size: 11px;
    color: var(--blue);
    background: #60a5fa15;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
  }
  .activity-item .act-type {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .activity-item .act-type.call { color: var(--yellow); background: #fbbf2415; }
  .activity-item .act-type.result { color: var(--green); background: #34d39915; }
  .activity-item .act-type.failed { color: var(--accent); background: var(--accent-dim); }
  .activity-item .act-tool {
    font-weight: 600;
    font-family: var(--mono);
    font-size: 12px;
  }
  .activity-item .act-duration {
    color: var(--green);
    font-family: var(--mono);
    font-size: 11px;
  }
  .activity-item .act-time {
    color: var(--text-dim);
    font-size: 11px;
    margin-left: auto;
  }
  .activity-detail {
    display: none;
    margin-top: 8px;
    padding: 10px;
    background: var(--bg);
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    max-height: 300px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-dim);
  }
  .activity-item.expanded .activity-detail { display: block; }

  /* ── Markdown in assistant messages ── */
  .msg.assistant {
    white-space: normal;
  }
  .msg.assistant p { margin: 0 0 0.6em 0; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant h1, .msg.assistant h2, .msg.assistant h3,
  .msg.assistant h4, .msg.assistant h5, .msg.assistant h6 {
    margin: 0.8em 0 0.4em 0;
    line-height: 1.3;
  }
  .msg.assistant h1:first-child, .msg.assistant h2:first-child,
  .msg.assistant h3:first-child { margin-top: 0; }
  .msg.assistant h1 { font-size: 1.3em; }
  .msg.assistant h2 { font-size: 1.15em; }
  .msg.assistant h3 { font-size: 1.05em; }
  .msg.assistant ul, .msg.assistant ol {
    margin: 0.4em 0 0.6em 1.4em;
    padding: 0;
  }
  .msg.assistant li { margin-bottom: 0.2em; }
  .msg.assistant code {
    font-family: var(--mono);
    font-size: 0.88em;
    background: var(--bg);
    padding: 2px 5px;
    border-radius: 4px;
  }
  .msg.assistant pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin: 0.5em 0;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
  }
  .msg.assistant pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }
  .msg.assistant blockquote {
    border-left: 3px solid var(--border);
    padding-left: 12px;
    margin: 0.5em 0;
    color: var(--text-dim);
  }
  .msg.assistant a {
    color: var(--blue);
    text-decoration: none;
  }
  .msg.assistant a:hover { text-decoration: underline; }
  .msg.assistant table {
    border-collapse: collapse;
    margin: 0.5em 0;
    font-size: 13px;
    width: 100%;
  }
  .msg.assistant th, .msg.assistant td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
  }
  .msg.assistant th {
    background: var(--bg);
    font-weight: 600;
  }
  .msg.assistant hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0.8em 0;
  }
  .msg.assistant strong { font-weight: 600; }

  /* ── Right panel (model selector) ── */
  #right-panel {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: margin-right 0.2s;
  }
  #right-panel.collapsed {
    display: none;
  }
  .rpanel-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rpanel-header span {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .rpanel-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--sans);
  }
  .rpanel-close:hover { color: var(--text); background: var(--surface2); }
  .rpanel-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .rpanel-current {
    margin: 6px 6px 14px;
    padding: 10px 12px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 8px;
  }
  .rpanel-current .cur-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .rpanel-current .cur-model {
    font-size: 13px;
    font-weight: 600;
    word-break: break-all;
  }
  .rpanel-current .cur-provider {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .provider-section {
    margin-bottom: 12px;
  }
  .provider-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 8px 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .provider-label .badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }
  .badge.online { color: var(--green); background: #34d39918; }
  .badge.offline { color: var(--text-dim); background: var(--surface2); }
  .model-item {
    padding: 8px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.12s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .model-item:hover { background: var(--surface2); }
  .model-item.active {
    background: var(--accent-dim);
  }
  .model-item .model-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .model-item .model-check {
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .model-toggle-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--sans);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .model-toggle-btn:hover { color: var(--text); border-color: var(--text-dim); }

  /* ── Deep Work Toggle ── */
  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .mode-toggle .mode-label {
    font-weight: 500;
    min-width: 70px;
    text-align: right;
  }
  .mode-toggle .mode-label.active { color: var(--text); }
  .toggle-switch {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }
  .toggle-switch input { display: none; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: all 0.2s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(16px);
    background: var(--accent);
  }

  /* ── Task Panel ── */
  #task-panel {
    border-top: 1px solid var(--border);
    background: var(--surface);
    max-height: 220px;
    overflow: hidden;
    display: none;
    flex-direction: column;
    flex-shrink: 0;
  }
  #task-panel.visible {
    display: flex;
  }
  .task-panel-header {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .task-panel-header:hover { background: var(--surface2); }
  .task-panel-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .task-panel-title .task-count {
    font-size: 10px;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 8px;
    color: var(--text-dim);
  }
  .task-panel-toggle {
    font-size: 12px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }
  #task-panel.collapsed .task-panel-toggle {
    transform: rotate(-90deg);
  }
  #task-panel.collapsed .task-list { display: none; }
  .task-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 8px;
  }
  .task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 12px;
    transition: background 0.1s;
  }
  .task-item:hover { background: var(--surface2); }
  .task-item.subtask { padding-left: 24px; }
  .task-badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .task-badge.pending { color: var(--text-dim); background: var(--surface2); }
  .task-badge.in_progress { color: var(--yellow); background: #fbbf2418; }
  .task-badge.completed { color: var(--green); background: #34d39918; }
  .task-badge.blocked { color: var(--accent); background: var(--accent-dim); }
  .task-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .task-item.completed-task .task-title {
    color: var(--text-dim);
    text-decoration: line-through;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
</head>
<body>

<header>
  <div class="title">agent_computer</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('chat')">Chat</button>
    <button class="nav-tab" onclick="showView('dashboard')">Dashboard</button>
  </div>
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="mode-toggle">
      <span class="mode-label active" id="modeLabelBounded">Bounded</span>
      <label class="toggle-switch">
        <input type="checkbox" id="deepWorkToggle" onchange="toggleDeepWork()">
        <span class="toggle-slider"></span>
      </label>
      <span class="mode-label" id="modeLabelDeep">Deep Work</span>
    </div>
    <button class="model-toggle-btn" id="modelToggleBtn" onclick="toggleRightPanel()">
      <span id="modelBadge">Loading...</span>
    </button>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting...</span>
    </div>
  </div>
</header>

<div class="app-container">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span>Sessions</span>
      <button onclick="newSession()">+ New</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <!-- Chat View -->
  <div id="chat-view">
    <div id="chat"></div>
    <div id="task-panel">
      <div class="task-panel-header" onclick="toggleTaskPanel()">
        <div class="task-panel-title">
          Tasks <span class="task-count" id="taskCount">0</span>
        </div>
        <span class="task-panel-toggle">&#9660;</span>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>
    <div id="input-area">
      <textarea id="input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button id="send" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Dashboard View -->
  <div id="dashboard-view">
    <div class="dash-section-title">Token Usage</div>
    <div class="time-range" id="timeRange">
      <button class="active" data-range="all" onclick="setTimeRange('all')">All Time</button>
      <button data-range="30d" onclick="setTimeRange('30d')">30 Days</button>
      <button data-range="7d" onclick="setTimeRange('7d')">7 Days</button>
      <button data-range="today" onclick="setTimeRange('today')">Today</button>
    </div>
    <div class="usage-cards">
      <div class="usage-card">
        <div class="card-label">Total Tokens</div>
        <div class="card-value" id="totalTokens">--</div>
      </div>
      <div class="usage-card">
        <div class="card-label">Prompt Tokens</div>
        <div class="card-value" id="promptTokens">--</div>
      </div>
      <div class="usage-card">
        <div class="card-label">Completion Tokens</div>
        <div class="card-value" id="completionTokens">--</div>
      </div>
      <div class="usage-card">
        <div class="card-label">API Calls</div>
        <div class="card-value" id="apiCalls">--</div>
      </div>
    </div>
    <div class="dash-section-title">Per-Session Breakdown</div>
    <div id="sessionUsageTable" style="margin-bottom:32px;"></div>

    <div class="dash-section-title">Live Agent Activity</div>
    <div class="activity-log" id="activityLog">
      <div class="activity-empty">Waiting for activity...</div>
    </div>
  </div>

  <!-- Right Panel: Model Selector -->
  <div id="right-panel" class="collapsed">
    <div class="rpanel-header">
      <span>Model</span>
      <button class="rpanel-close" onclick="toggleRightPanel()">&times;</button>
    </div>
    <div class="rpanel-body">
      <div class="rpanel-current" id="currentModelCard">
        <div class="cur-label">Active Model</div>
        <div class="cur-model" id="curModelName">--</div>
        <div class="cur-provider" id="curProviderName">--</div>
      </div>
      <div id="modelList"></div>
    </div>
  </div>
</div>

<script>
// ─── DOM refs ───
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

// ─── State ───
const urlParams = new URLSearchParams(window.location.search);
let sessionId = urlParams.get('session') || localStorage.getItem('agent_computer_session') || randomId();
localStorage.setItem('agent_computer_session', sessionId);

let ws = null;
let busy = false;
let currentThinking = null;
let currentAssistant = null;
let currentView = 'chat';
let currentTimeRange = 'all';
let activityWs = null;
let reconnectTimer = null;
let currentAssistantRawText = '';
let currentMode = 'bounded';
let taskPanelCollapsed = false;

// ─── Markdown rendering ───
marked.setOptions({
  breaks: true,
  gfm: true,
});

function renderMarkdown(text) {
  try {
    return marked.parse(text);
  } catch (e) {
    return escapeHtml(text);
  }
}

function randomId() {
  return Math.random().toString(36).substring(2, 10);
}

// ─── View switching ───
function showView(view) {
  currentView = view;
  document.getElementById('chat-view').style.display = view === 'chat' ? 'flex' : 'none';
  document.getElementById('dashboard-view').style.display = view === 'dashboard' ? 'block' : 'none';
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.classList.toggle('active', tab.textContent.toLowerCase() === view);
  });
  if (view === 'dashboard') {
    loadUsageData();
    connectActivityWs();
  } else if (view === 'chat') {
    inputEl.focus();
  }
}

// ─── WebSocket (chat) ───
function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${sessionId}`);

  ws.onopen = () => {
    statusDot.className = 'status-dot';
    statusText.textContent = sessionId.substring(0, 8);
    // Sync current mode to server on connect/reconnect
    if (currentMode !== 'bounded') {
      ws.send(JSON.stringify({ type: 'set_mode', mode: currentMode }));
    }
  };

  ws.onclose = () => {
    statusDot.className = 'status-dot disconnected';
    statusText.textContent = 'disconnected';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    statusDot.className = 'status-dot disconnected';
  };

  ws.onmessage = (evt) => {
    const data = JSON.parse(evt.data);
    handleEvent(data);
  };
}

function handleEvent(data) {
  switch (data.type) {
    case 'thinking': {
      removeThinking();
      let thinkText;
      if (currentMode === 'deep_work' && data.max_iterations) {
        const tokensK = data.tokens_used ? Math.round(data.tokens_used / 1000) : 0;
        thinkText = `Step ${data.iteration}/${data.max_iterations} | ${tokensK}k tokens`;
      } else {
        thinkText = `Thinking (step ${data.iteration})...`;
      }
      currentThinking = addThinking(thinkText);
      currentAssistant = null;
      break;
    }

    case 'text':
      removeThinking();
      if (!currentAssistant) {
        currentAssistantRawText = data.text;
        currentAssistant = addMessage('assistant', data.text);
      } else {
        currentAssistantRawText += data.text;
        currentAssistant.innerHTML = renderMarkdown(currentAssistantRawText);
      }
      scrollToBottom();
      break;

    case 'tool_call': {
      removeThinking();
      const inputStr = JSON.stringify(data.input, null, 2);
      addToolEvent('call', data.tool, inputStr);
      break;
    }

    case 'tool_result': {
      const durationStr = data.duration_ms != null ? `${data.duration_ms}ms` : '';
      addToolEvent('result', data.tool, data.result_preview, durationStr);
      break;
    }

    case 'task_update':
      renderTasks(data.tasks || []);
      break;

    case 'mode_changed':
      currentMode = data.mode;
      updateModeUI();
      break;

    case 'done':
      removeThinking();
      busy = false;
      sendBtn.disabled = false;
      currentAssistantRawText = '';
      inputEl.focus();
      if (data.usage && data.usage.total_tokens) {
        const modeTag = data.mode === 'deep_work' ? ' [deep work]' : '';
        addSystem(`${data.iterations} iteration(s) | ${formatNumber(data.usage.total_tokens)} tokens${modeTag}`);
      }
      loadSessions();
      break;

    case 'error':
      removeThinking();
      addSystem(`Error: ${data.message}`);
      busy = false;
      sendBtn.disabled = false;
      break;

    case 'cleared':
      chatEl.innerHTML = '';
      renderTasks([]);
      addSystem('Session cleared');
      break;
  }
}

// ─── Chat helpers ───
function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy || !ws || ws.readyState !== 1) return;

  if (text === '/clear') {
    ws.send(JSON.stringify({ type: 'clear' }));
    inputEl.value = '';
    return;
  }
  if (text === '/new') {
    newSession();
    inputEl.value = '';
    return;
  }

  addMessage('user', text);
  ws.send(JSON.stringify({ type: 'message', content: text }));
  inputEl.value = '';
  inputEl.style.height = 'auto';
  busy = true;
  sendBtn.disabled = true;
  currentAssistant = null;
  currentAssistantRawText = '';
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant') {
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }
  chatEl.appendChild(div);
  scrollToBottom();
  return div;
}

function addSystem(text) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  chatEl.appendChild(div);
  scrollToBottom();
}

function addToolEvent(kind, toolName, detail, duration) {
  const div = document.createElement('div');
  div.className = `tool-event ${kind === 'result' ? 'result' : ''}`;
  const icon = kind === 'result' ? '\u2713' : '\u26A1';
  let labelHtml = `<span class="label">${icon} ${escapeHtml(toolName)}</span>`;
  if (duration) {
    labelHtml += `<span class="duration">${escapeHtml(duration)}</span>`;
  }
  div.innerHTML = labelHtml;
  if (detail) {
    const pre = document.createElement('pre');
    pre.textContent = detail;
    div.appendChild(pre);
    div.onclick = () => div.classList.toggle('expanded');
  }
  chatEl.appendChild(div);
  scrollToBottom();
}

function addThinking(text) {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = `<span class="dots"><span></span><span></span><span></span></span> ${escapeHtml(text)}`;
  chatEl.appendChild(div);
  scrollToBottom();
  return div;
}

function removeThinking() {
  if (currentThinking) {
    currentThinking.remove();
    currentThinking = null;
  }
}

function scrollToBottom() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ─── Sidebar ───
let sessions = [];

async function loadSessions() {
  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    sessions = data.sessions;
    renderSessions();
  } catch (e) {
    console.error('Failed to load sessions:', e);
  }
}

function renderSessions() {
  const list = document.getElementById('sessionList');
  list.innerHTML = '';
  for (const s of sessions) {
    const div = document.createElement('div');
    div.className = `session-item${s.session_id === sessionId ? ' active' : ''}`;

    const preview = escapeHtml(s.preview || s.session_id);
    const timeStr = s.last_activity ? timeAgo(s.last_activity) : '';
    const msgCount = s.messages || 0;

    div.innerHTML = `
      <div class="session-preview">${preview}</div>
      <div class="session-meta">${msgCount} msgs${timeStr ? ' \u00b7 ' + timeStr : ''}</div>
      <div class="session-delete" title="Delete session">\u00d7</div>
    `;

    div.querySelector('.session-delete').onclick = (e) => {
      e.stopPropagation();
      deleteSession(s.session_id);
    };
    div.onclick = () => switchSession(s.session_id);

    list.appendChild(div);
  }
}

async function switchSession(newSessionId) {
  if (newSessionId === sessionId) return;

  // Close current WebSocket
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (ws) { ws.onclose = null; ws.close(); }

  sessionId = newSessionId;
  localStorage.setItem('agent_computer_session', sessionId);

  // Clear chat and load history
  chatEl.innerHTML = '';
  busy = false;
  sendBtn.disabled = false;
  currentAssistant = null;
  currentThinking = null;

  try {
    const resp = await fetch(`/api/sessions/${sessionId}/history`);
    const data = await resp.json();
    renderHistory(data.messages);
  } catch (e) {
    addSystem('Failed to load session history');
  }

  // Load tasks for this session
  loadSessionTasks();

  connect();
  renderSessions();

  if (currentView === 'chat') inputEl.focus();
}

function renderHistory(messages) {
  for (const msg of messages) {
    if (msg.role === 'user') {
      addMessage('user', typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content));
    } else if (msg.role === 'assistant') {
      if (typeof msg.content === 'string') {
        addMessage('assistant', msg.content);
      }
      // Skip assistant messages that are just tool_calls containers (content is a dict)
    } else if (msg.role === 'tool') {
      const preview = typeof msg.content === 'string' ? msg.content.substring(0, 300) : JSON.stringify(msg.content).substring(0, 300);
      addToolEvent('result', msg.tool_name || 'tool', preview);
    }
  }
}

async function deleteSession(sid) {
  if (!confirm(`Delete session "${sid}"?`)) return;
  try {
    await fetch(`/api/sessions/${sid}`, { method: 'DELETE' });
    if (sid === sessionId) {
      newSession();
    } else {
      loadSessions();
    }
  } catch (e) {
    console.error('Delete failed:', e);
  }
}

function newSession() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (ws) { ws.onclose = null; ws.close(); }
  sessionId = randomId();
  localStorage.setItem('agent_computer_session', sessionId);
  chatEl.innerHTML = '';
  busy = false;
  sendBtn.disabled = false;
  currentAssistant = null;
  currentThinking = null;
  // Reset mode and clear stale task panel from previous session
  currentMode = 'bounded';
  updateModeUI();
  renderTasks([]);
  connect();
  loadSessions();
  if (currentView === 'chat') inputEl.focus();
}

// ─── Dashboard: Token Usage ───
async function loadUsageData() {
  try {
    const resp = await fetch(`/api/usage?range=${currentTimeRange}`);
    const data = await resp.json();

    document.getElementById('totalTokens').textContent = formatNumber(data.total.total_tokens);
    document.getElementById('promptTokens').textContent = formatNumber(data.total.prompt_tokens);
    document.getElementById('completionTokens').textContent = formatNumber(data.total.completion_tokens);
    document.getElementById('apiCalls').textContent = formatNumber(data.total.api_calls);

    // Per-session table
    const container = document.getElementById('sessionUsageTable');
    if (data.sessions.length === 0) {
      container.innerHTML = '<div style="color:var(--text-dim); font-size:13px;">No usage data yet.</div>';
      return;
    }
    let html = '<table class="usage-table"><thead><tr>';
    html += '<th>Session</th><th class="right">Prompt</th><th class="right">Completion</th><th class="right">Total</th><th class="right">Calls</th>';
    html += '</tr></thead><tbody>';
    for (const s of data.sessions) {
      html += '<tr>';
      html += `<td class="session-name">${escapeHtml(s.preview || s.session_id)}</td>`;
      html += `<td class="right">${formatNumber(s.prompt_tokens)}</td>`;
      html += `<td class="right">${formatNumber(s.completion_tokens)}</td>`;
      html += `<td class="right">${formatNumber(s.total_tokens)}</td>`;
      html += `<td class="right">${s.api_calls}</td>`;
      html += '</tr>';
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (e) {
    console.error('Failed to load usage:', e);
  }
}

function setTimeRange(range) {
  currentTimeRange = range;
  document.querySelectorAll('#timeRange button').forEach(b => {
    b.classList.toggle('active', b.dataset.range === range);
  });
  loadUsageData();
}

// ─── Dashboard: Live Activity ───
function connectActivityWs() {
  if (activityWs && activityWs.readyState === WebSocket.OPEN) return;

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  activityWs = new WebSocket(`${proto}://${location.host}/ws/activity`);

  activityWs.onmessage = (evt) => {
    const event = JSON.parse(evt.data);
    addActivityItem(event, true);
  };

  activityWs.onclose = () => {
    if (currentView === 'dashboard') {
      setTimeout(connectActivityWs, 3000);
    }
  };

  fetchRecentActivity();
}

async function fetchRecentActivity() {
  try {
    const resp = await fetch('/api/activity?limit=50');
    const data = await resp.json();
    const log = document.getElementById('activityLog');
    log.innerHTML = '';
    if (data.events.length === 0) {
      log.innerHTML = '<div class="activity-empty">No activity yet.</div>';
      return;
    }
    for (const event of data.events) {
      addActivityItem(event, false);
    }
  } catch (e) {
    console.error('Failed to fetch activity:', e);
  }
}

function addActivityItem(event, prepend) {
  const log = document.getElementById('activityLog');

  // Remove placeholder
  const empty = log.querySelector('.activity-empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  const isResult = event.type === 'tool_result';
  const isFailed = isResult && event.success === false;
  div.className = 'activity-item';

  const timeStr = event.timestamp ? new Date(event.timestamp * 1000).toLocaleTimeString() : '';

  let typeLabel, typeClass;
  if (isFailed) {
    typeLabel = 'failed'; typeClass = 'failed';
  } else if (isResult) {
    typeLabel = 'result'; typeClass = 'result';
  } else {
    typeLabel = 'call'; typeClass = 'call';
  }

  let detailContent;
  if (isResult) {
    detailContent = event.result_preview || '';
  } else {
    detailContent = event.input ? JSON.stringify(event.input, null, 2) : '';
  }

  div.innerHTML = `
    <div class="act-row">
      <span class="act-session">${escapeHtml((event.session_id || '').substring(0, 8))}</span>
      <span class="act-type ${typeClass}">${typeLabel}</span>
      <span class="act-tool">${escapeHtml(event.tool || '')}</span>
      ${isResult && event.duration_ms != null ? `<span class="act-duration">${event.duration_ms}ms</span>` : ''}
      <span class="act-time">${timeStr}</span>
    </div>
    <div class="activity-detail">${escapeHtml(detailContent)}</div>
  `;

  div.onclick = () => div.classList.toggle('expanded');

  if (prepend) {
    log.insertBefore(div, log.firstChild);
    while (log.children.length > 100) {
      log.removeChild(log.lastChild);
    }
  } else {
    log.appendChild(div);
  }
}

// ─── Utilities ───
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatNumber(n) {
  if (n === undefined || n === null || n === 0) return '0';
  return n.toLocaleString();
}

function timeAgo(ts) {
  const diff = Math.floor(Date.now() / 1000 - ts);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
  return new Date(ts * 1000).toLocaleDateString();
}

// ─── Right panel: Model Selector ───
let rightPanelOpen = false;

function toggleRightPanel() {
  rightPanelOpen = !rightPanelOpen;
  document.getElementById('right-panel').classList.toggle('collapsed', !rightPanelOpen);
  if (rightPanelOpen) loadModels();
}

async function loadModels() {
  try {
    const resp = await fetch('/api/models');
    const data = await resp.json();
    renderModels(data);
  } catch (e) {
    console.error('Failed to load models:', e);
  }
}

function renderModels(data) {
  const current = data.current;

  // Update header badge
  const shortName = current.model_id.split('/').pop();
  document.getElementById('modelBadge').textContent = shortName;

  // Update current card
  document.getElementById('curModelName').textContent = current.model_id;
  document.getElementById('curProviderName').textContent = current.provider;

  // Render provider sections
  const list = document.getElementById('modelList');
  list.innerHTML = '';

  for (const [providerKey, provider] of Object.entries(data.providers)) {
    const section = document.createElement('div');
    section.className = 'provider-section';

    let badgeHtml = '';
    if (providerKey === 'lmstudio') {
      const online = provider.reachable;
      badgeHtml = `<span class="badge ${online ? 'online' : 'offline'}">${online ? 'online' : 'offline'}</span>`;
    }

    section.innerHTML = `<div class="provider-label">${escapeHtml(provider.name)} ${badgeHtml}</div>`;

    if (providerKey === 'lmstudio' && !provider.reachable) {
      const note = document.createElement('div');
      note.style.cssText = 'padding:6px 10px; font-size:11px; color:var(--text-dim);';
      note.textContent = 'LM Studio not reachable';
      section.appendChild(note);
    }

    for (const model of provider.models) {
      const isActive = current.provider === providerKey && current.model_id === model.id;
      const item = document.createElement('div');
      item.className = `model-item${isActive ? ' active' : ''}`;
      item.innerHTML = `
        <span class="model-name" title="${escapeHtml(model.id)}">${escapeHtml(model.name || model.id)}</span>
        ${isActive ? '<span class="model-check">\u2713</span>' : ''}
      `;
      if (!isActive) {
        item.onclick = () => selectModel(providerKey, model.id);
      }
      section.appendChild(item);
    }

    list.appendChild(section);
  }
}

async function selectModel(provider, modelId) {
  try {
    const resp = await fetch('/api/models/select', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, model_id: modelId }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      addSystem(`Failed to switch model: ${err.detail || 'unknown error'}`);
      return;
    }
    await loadModels();
    addSystem(`Model switched to ${modelId}`);
  } catch (e) {
    addSystem(`Failed to switch model: ${e.message}`);
  }
}

// Load model badge on startup
async function loadModelBadge() {
  try {
    const resp = await fetch('/api/models');
    const data = await resp.json();
    const shortName = data.current.model_id.split('/').pop();
    document.getElementById('modelBadge').textContent = shortName;
  } catch (e) {
    document.getElementById('modelBadge').textContent = 'Model';
  }
}

// ─── Deep Work Mode ───
function toggleDeepWork() {
  const toggle = document.getElementById('deepWorkToggle');
  currentMode = toggle.checked ? 'deep_work' : 'bounded';
  updateModeUI();

  // Send mode change to server
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_mode', mode: currentMode }));
  }

  // Reload tasks when enabling deep work to show current session's actual tasks
  if (currentMode === 'deep_work') {
    loadSessionTasks();
  }
}

function updateModeUI() {
  const toggle = document.getElementById('deepWorkToggle');
  const labelBounded = document.getElementById('modeLabelBounded');
  const labelDeep = document.getElementById('modeLabelDeep');
  const taskPanel = document.getElementById('task-panel');

  toggle.checked = currentMode === 'deep_work';
  labelBounded.classList.toggle('active', currentMode === 'bounded');
  labelDeep.classList.toggle('active', currentMode === 'deep_work');

  // Show/hide task panel
  if (currentMode === 'deep_work') {
    taskPanel.classList.add('visible');
  } else {
    taskPanel.classList.remove('visible');
  }
}

function toggleTaskPanel() {
  const panel = document.getElementById('task-panel');
  taskPanelCollapsed = !taskPanelCollapsed;
  panel.classList.toggle('collapsed', taskPanelCollapsed);
}

function renderTasks(tasks) {
  const list = document.getElementById('taskList');
  const countEl = document.getElementById('taskCount');
  countEl.textContent = tasks.length;

  if (tasks.length === 0) {
    list.innerHTML = '<div style="padding:8px 12px; font-size:11px; color:var(--text-dim);">No tasks yet. The agent will create tasks when working.</div>';
    return;
  }

  list.innerHTML = '';

  // Separate top-level and subtasks
  const topLevel = tasks.filter(t => t.parent_id === null || t.parent_id === undefined);
  const childrenMap = {};
  for (const t of tasks) {
    if (t.parent_id != null) {
      if (!childrenMap[t.parent_id]) childrenMap[t.parent_id] = [];
      childrenMap[t.parent_id].push(t);
    }
  }

  for (const task of topLevel) {
    list.appendChild(createTaskItem(task, false));
    const children = childrenMap[task.id] || [];
    for (const child of children) {
      list.appendChild(createTaskItem(child, true));
    }
  }
}

function createTaskItem(task, isSubtask) {
  const div = document.createElement('div');
  const isCompleted = task.status === 'completed';
  div.className = `task-item${isSubtask ? ' subtask' : ''}${isCompleted ? ' completed-task' : ''}`;
  div.innerHTML = `
    <span class="task-badge ${task.status}">${task.status.replace('_', ' ')}</span>
    <span class="task-title" title="${escapeHtml(task.description || task.title)}">${escapeHtml(task.title)}</span>
  `;
  return div;
}

async function loadSessionTasks() {
  try {
    const resp = await fetch(`/api/sessions/${sessionId}/tasks`);
    const data = await resp.json();
    renderTasks(data.tasks || []);
    // Sync mode from server — session.mode is the source of truth
    if (data.mode && data.mode !== currentMode) {
      currentMode = data.mode;
      updateModeUI();
    }
  } catch (e) {
    console.error('Failed to load tasks:', e);
  }
}

// ─── Input handlers ───
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ─── Initialize ───
connect();
loadSessions();
loadModelBadge();
loadSessionTasks();
setInterval(loadSessions, 30000);
</script>
</body>
